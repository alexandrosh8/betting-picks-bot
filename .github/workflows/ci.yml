name: CI

on:
  push:
    branches: [main]
  pull_request:

# gitleaks-action v3 lists PR commits via the API on pull_request events —
# the default restricted GITHUB_TOKEN (contents: read only) 403s without
# pull-requests: read.
permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres service so the 163 DB-gated tests RUN in CI instead of silently
    # skipping. tests/conftest.py probes localhost:5433 (the compose host port)
    # and pytest.skip()s the whole DB suite when it is unreachable — without this
    # service the settlement engine, CLV re-pricing, snapshot-close and the
    # Pinnacle close re-key had ZERO CI signal. On ubuntu-latest the job runs on
    # the runner host (not in a container), so the service's 5433:5432 mapping is
    # reachable at localhost:5433, exactly where conftest connects. The healthcheck
    # makes the job wait for readiness before the first step. Credentials match
    # conftest._BASE (betting_ai/betting_ai) — a throwaway CI database, not a
    # secret; the schema is built from ORM metadata (no alembic step needed).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: betting_ai
          POSTGRES_PASSWORD: betting_ai
          POSTGRES_DB: betting_ai
          TZ: UTC
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U betting_ai -d betting_ai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # setup-uv publishes no moving major alias past v7 — pin the exact tag
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Mirror the production image (Dockerfile): the scraper and football
        # model live in extras; without them pytest collection used to die
        # on ModuleNotFoundError (CI run 27413210078).
        run: uv sync --frozen --extra football --extra backfill

      - name: Tests
        run: uv run pytest -q

      # Pin ruff so CI formatting matches local exactly — an unpinned `uvx ruff`
      # resolves whatever version the runner cached, which silently drifts from
      # the dev's ruff and fails format-check on identical code.
      - name: Lint
        run: uvx ruff@0.15.18 check app tests

      - name: Format check
        run: uvx ruff@0.15.18 format --check app tests

      - name: Types
        run: uv run mypy app

      - name: Safety audit (no bet-placement code path)
        run: bash scripts/safety_audit.sh

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
